<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="860" viewBox="0 0 1400 860" role="img" aria-labelledby="hz-title hz-desc" font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif">
  <title id="hz-title">credo — horizon 2026–2035</title>
  <desc id="hz-desc">Ten-year roadmap from text MVP to civic infrastructure: foundation, crypto layer, generative UI, local-first sovereignty, federated mesh, ZK governance, self-authoring skills, personal constitution, inter-DAO settlement, civic infra.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="860" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#06060A"/>
      <stop offset="1" stop-color="#0A0A14"/>
    </linearGradient>
    <radialGradient id="orb-a" cx="200" cy="200" r="540" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6366F1" stop-opacity=".25"/>
      <stop offset="1" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb-b" cx="1200" cy="660" r="520" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F472B6" stop-opacity=".18"/>
      <stop offset="1" stop-color="#F472B6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#FFFFFF" stroke-opacity=".035"/>
    </pattern>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity=".07"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity=".02"/>
    </linearGradient>
    <linearGradient id="card-border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity=".22"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity=".06"/>
    </linearGradient>
    <linearGradient id="rail" x1="0" y1="0" x2="1400" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0"   stop-color="#34D399" stop-opacity=".85"/>
      <stop offset=".22" stop-color="#22D3EE" stop-opacity=".85"/>
      <stop offset=".48" stop-color="#A78BFA" stop-opacity=".80"/>
      <stop offset=".74" stop-color="#F472B6" stop-opacity=".55"/>
      <stop offset="1"   stop-color="#FBBF24" stop-opacity=".35"/>
    </linearGradient>
  </defs>

  <rect width="1400" height="860" fill="url(#bg)"/>
  <rect width="1400" height="860" fill="url(#grid)"/>
  <rect width="1400" height="860" fill="url(#orb-a)"/>
  <rect width="1400" height="860" fill="url(#orb-b)"/>

  <text x="60" y="64" fill="#A78BFA" font-size="12" letter-spacing="3" font-weight="600">CREDO  /  HORIZON  2026 — 2035</text>
  <text x="60" y="104" fill="#EDEDED" font-size="34" font-weight="700" letter-spacing="-1.4">Ten years from MVP to civic infrastructure.</text>
  <text x="60" y="134" fill="#94A3B8" font-size="15">Each year compounds on the last. Boring foundations first, then crypto, then generative interfaces, then sovereignty.</text>

  <!-- legend -->
  <g transform="translate(60 170)" font-size="11" fill="#94A3B8">
    <g><circle r="4" cx="6" cy="6" fill="#34D399"/><text x="18" y="10">SHIPPING</text></g>
    <g transform="translate(96 0)"><circle r="4" cx="6" cy="6" fill="#22D3EE"/><text x="18" y="10">NEAR TERM</text></g>
    <g transform="translate(204 0)"><circle r="4" cx="6" cy="6" fill="#A78BFA"/><text x="18" y="10">VISION</text></g>
    <g transform="translate(286 0)"><circle r="4" cx="6" cy="6" fill="#F472B6"/><text x="18" y="10">FAR HORIZON</text></g>
    <g transform="translate(396 0)"><circle r="4" cx="6" cy="6" fill="#FBBF24"/><text x="18" y="10">CIVIC SCALE</text></g>
  </g>

  <!-- rail -->
  <line x1="100" y1="450" x2="1340" y2="450" stroke="url(#rail)" stroke-width="3"/>

