  <!-- bottom narrative -->
  <g transform="translate(60 600)">
    <text x="0" y="0" fill="#6366F1" font-size="11" letter-spacing="2.4" font-weight="600">TRAJECTORY</text>
    <text x="0" y="40" fill="#EDEDED" font-size="20" font-weight="700" letter-spacing="-.4">From a chat room with one bot, to a public protocol cities can run on.</text>
    <text x="0" y="76" fill="#94A3B8" font-size="14" font-weight="400">The first three years are about boring foundations: ship the MVP, add Ed25519 governance, give every agent action its own generated interface.</text>
    <text x="0" y="100" fill="#94A3B8" font-size="14" font-weight="400">Years four through seven are about sovereignty and federation: local-first replicas, ZK governance, agents that author and version their own skills.</text>
    <text x="0" y="124" fill="#94A3B8" font-size="14" font-weight="400">By 2033 every person carries a portable Credo charter. By 2035 the same stack runs co-ops, neighbourhoods and public bodies — boring like email, civic like the postal service.</text>
  </g>

  <!-- timeline marker for "today" -->
