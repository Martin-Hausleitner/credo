<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="dg-title dg-desc" font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif">
  <title id="dg-title">DAO governance for agent actions</title>
  <desc id="dg-desc">Every risky agent action is a proposal: discussion, m-of-n Ed25519 signatures, quorum, settlement on Matrix and optional Safe/L2 anchor, then execution.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="760" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#06060A"/>
      <stop offset="1" stop-color="#0A0A14"/>
    </linearGradient>
    <radialGradient id="orb-a" cx="220" cy="120" r="500" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F59E0B" stop-opacity=".22"/>
      <stop offset="1" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb-b" cx="1200" cy="640" r="520" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22D3EE" stop-opacity=".20"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#FFFFFF" stroke-opacity=".035"/>
    </pattern>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity=".07"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity=".02"/>
    </linearGradient>
    <linearGradient id="card-border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity=".22"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity=".06"/>
    </linearGradient>
    <linearGradient id="rail" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#F59E0B" stop-opacity=".15"/>
      <stop offset=".5" stop-color="#22D3EE" stop-opacity=".75"/>
      <stop offset="1" stop-color="#34D399" stop-opacity=".55"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="8"/></filter>
  </defs>

  <rect width="1400" height="760" fill="url(#bg)"/>
  <rect width="1400" height="760" fill="url(#grid)"/>
  <rect width="1400" height="760" fill="url(#orb-a)"/>
  <rect width="1400" height="760" fill="url(#orb-b)"/>

  <text x="60" y="64" fill="#FBBF24" font-size="12" letter-spacing="3" font-weight="600">CREDO  /  DAO  GOVERNANCE</text>
  <text x="60" y="104" fill="#EDEDED" font-size="34" font-weight="700" letter-spacing="-1.4">Every risky action becomes a proposal.</text>
  <text x="60" y="134" fill="#94A3B8" font-size="15">Discussion · m-of-n Ed25519 signatures · quorum · settle on Matrix &amp; optionally L2 · then execute.</text>

  <!-- rail -->
  <line x1="120" y1="290" x2="1280" y2="290" stroke="url(#rail)" stroke-width="3"/>

  <!-- 5 stage cards: 240 wide, gutter 30, total 5*240 + 4*30 = 1320, start x = 40 -->
  <g font-family="Inter, ui-sans-serif, system-ui, sans-serif">

    <!-- 01 Proposal -->
    <g transform="translate(40 200)">
      <rect width="240" height="180" rx="16" fill="url(#card)" stroke="url(#card-border)"/>
      <g transform="translate(20 20)">
        <rect width="36" height="36" rx="10" fill="#FBBF24"/>
        <!-- doc icon -->
        <path d="M11 8 h11 l5 5 v17 H11 Z" fill="none" stroke="#0A0A0A" stroke-width="2"/>
        <path d="M22 8 v5 h5" fill="none" stroke="#0A0A0A" stroke-width="2"/>
        <line x1="14" y1="22" x2="24" y2="22" stroke="#0A0A0A" stroke-width="2"/>
      </g>
      <text x="68" y="44" fill="#EDEDED" font-size="13" font-weight="700">01 · Proposal</text>
      <text x="20" y="80" fill="#94A3B8" font-size="11">agent: @hermes</text>
      <text x="20" y="98" fill="#94A3B8" font-size="11">action: deploy v2.4</text>
      <text x="20" y="116" fill="#94A3B8" font-size="11">risk class: high</text>
      <line x1="20" y1="132" x2="220" y2="132" stroke="#FFFFFF" stroke-opacity=".08"/>
      <text x="20" y="152" fill="#6B7280" font-size="10" font-family="ui-monospace, monospace">cid: bafyrei…7q9w</text>
      <text x="20" y="168" fill="#6B7280" font-size="10">posted to #ops</text>
    </g>

    <!-- 02 Discussion -->
    <g transform="translate(310 200)">
      <rect width="240" height="180" rx="16" fill="url(#card)" stroke="url(#card-border)"/>
      <g transform="translate(20 20)">
        <rect width="36" height="36" rx="10" fill="#A78BFA"/>
        <path d="M10 24 v-10 a3 3 0 0 1 3 -3 h10 a3 3 0 0 1 3 3 v8 a3 3 0 0 1 -3 3 h-8 l-5 4 z" fill="none" stroke="#0A0A0A" stroke-width="2" stroke-linejoin="round"/>
      </g>
      <text x="68" y="44" fill="#EDEDED" font-size="13" font-weight="700">02 · Discussion</text>
      <text x="20" y="80" fill="#94A3B8" font-size="11">Matrix room: #dao-ops</text>
      <text x="20" y="98" fill="#94A3B8" font-size="11">members: 8 · online: 5</text>
      <text x="20" y="116" fill="#94A3B8" font-size="11">replies: 14 · 1 amendment</text>
      <line x1="20" y1="132" x2="220" y2="132" stroke="#FFFFFF" stroke-opacity=".08"/>
      <text x="20" y="152" fill="#6B7280" font-size="10" font-family="ui-monospace, monospace">thread $abc1…f3</text>
      <text x="20" y="168" fill="#6B7280" font-size="10">timer: 4h 12m left</text>
    </g>

    <!-- 03 Signatures -->
    <g transform="translate(580 200)">
      <rect width="240" height="180" rx="16" fill="url(#card)" stroke="url(#card-border)"/>
      <g transform="translate(20 20)">
        <rect width="36" height="36" rx="10" fill="#22D3EE"/>
        <!-- key icon -->
        <circle cx="14" cy="20" r="5" fill="none" stroke="#0A0A0A" stroke-width="2"/>
        <path d="M19 20 h11 m-4 0 v4 m-3 -4 v3" fill="none" stroke="#0A0A0A" stroke-width="2"/>
      </g>
      <text x="68" y="44" fill="#EDEDED" font-size="13" font-weight="700">03 · Signatures</text>
      <text x="20" y="78" fill="#94A3B8" font-size="11">algo: Ed25519</text>
      <text x="20" y="96" fill="#94A3B8" font-size="11">quorum: 3 of 5</text>
      <!-- signer dots -->
      <g transform="translate(20 110)">
        <g><circle r="9" cx="9" cy="9" fill="#34D399" fill-opacity=".18" stroke="#34D399" stroke-width="1.4"/><path d="M5 9 l3 3 l5 -6" fill="none" stroke="#34D399" stroke-width="1.6" stroke-linecap="round" transform="translate(0 0)"/></g>
        <g transform="translate(28 0)"><circle r="9" cx="9" cy="9" fill="#34D399" fill-opacity=".18" stroke="#34D399" stroke-width="1.4"/><path d="M5 9 l3 3 l5 -6" fill="none" stroke="#34D399" stroke-width="1.6" stroke-linecap="round"/></g>
        <g transform="translate(56 0)"><circle r="9" cx="9" cy="9" fill="#34D399" fill-opacity=".18" stroke="#34D399" stroke-width="1.4"/><path d="M5 9 l3 3 l5 -6" fill="none" stroke="#34D399" stroke-width="1.6" stroke-linecap="round"/></g>
        <g transform="translate(84 0)"><circle r="9" cx="9" cy="9" fill="none" stroke="#6B7280" stroke-width="1.4" stroke-dasharray="2 2"/></g>
        <g transform="translate(112 0)"><circle r="9" cx="9" cy="9" fill="none" stroke="#6B7280" stroke-width="1.4" stroke-dasharray="2 2"/></g>
      </g>
      <text x="160" y="124" fill="#34D399" font-size="11" font-weight="700">3 / 5  ✓</text>
      <line x1="20" y1="148" x2="220" y2="148" stroke="#FFFFFF" stroke-opacity=".08"/>
      <text x="20" y="168" fill="#6B7280" font-size="10" font-family="ui-monospace, monospace">sig: 9c3a…2f · pub k …</text>
    </g>

    <!-- 04 Quorum / Settle -->
    <g transform="translate(850 200)">
      <rect width="240" height="180" rx="16" fill="url(#card)" stroke="url(#card-border)"/>
      <g transform="translate(20 20)">
        <rect width="36" height="36" rx="10" fill="#6366F1"/>
        <!-- shield -->
        <path d="M18 6 l10 4 v8 c0 6-4 10-10 12-6-2-10-6-10-12 v-8 z" fill="none" stroke="#0A0A0A" stroke-width="2" stroke-linejoin="round"/>
        <path d="M13 18 l4 4 l8 -8" fill="none" stroke="#0A0A0A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
      <text x="68" y="44" fill="#EDEDED" font-size="13" font-weight="700">04 · Quorum + Settle</text>
      <text x="20" y="80" fill="#94A3B8" font-size="11">quorum reached · 21:04</text>
      <text x="20" y="98" fill="#94A3B8" font-size="11">anchors:</text>
      <g transform="translate(20 110)" font-size="10" fill="#CBD5E1">
        <g transform="translate(0 0)">
          <rect width="74" height="20" rx="10" fill="#FFFFFF" fill-opacity=".05" stroke="#FFFFFF" stroke-opacity=".12"/>
          <text x="37" y="14" text-anchor="middle">matrix</text>
        </g>
        <g transform="translate(80 0)">
          <rect width="58" height="20" rx="10" fill="#FFFFFF" fill-opacity=".05" stroke="#FFFFFF" stroke-opacity=".12"/>
          <text x="29" y="14" text-anchor="middle">safe</text>
        </g>
        <g transform="translate(144 0)">
          <rect width="56" height="20" rx="10" fill="#FFFFFF" fill-opacity=".05" stroke="#FFFFFF" stroke-opacity=".12"/>
          <text x="28" y="14" text-anchor="middle">ipfs</text>
        </g>
      </g>
      <line x1="20" y1="148" x2="220" y2="148" stroke="#FFFFFF" stroke-opacity=".08"/>
      <text x="20" y="168" fill="#6B7280" font-size="10" font-family="ui-monospace, monospace">tx 0x9f2c…ab</text>
    </g>

    <!-- 05 Execute -->
    <g transform="translate(1120 200)">
      <rect width="240" height="180" rx="16" fill="url(#card)" stroke="url(#card-border)"/>
      <g transform="translate(20 20)">
        <rect width="36" height="36" rx="10" fill="#34D399"/>
        <!-- play / bolt -->
        <path d="M14 8 l-2 12 h6 l-2 10 l10 -14 h-6 l2 -8 z" fill="#0A0A0A"/>
      </g>
      <text x="68" y="44" fill="#EDEDED" font-size="13" font-weight="700">05 · Execute</text>
      <text x="20" y="80" fill="#94A3B8" font-size="11">runner: hermes-worker-2</text>
      <text x="20" y="98" fill="#94A3B8" font-size="11">attached proof: yes</text>
      <text x="20" y="116" fill="#94A3B8" font-size="11">policy gate: passed</text>
      <line x1="20" y1="132" x2="220" y2="132" stroke="#FFFFFF" stroke-opacity=".08"/>
      <text x="20" y="152" fill="#6B7280" font-size="10" font-family="ui-monospace, monospace">job 2024:91ce</text>
      <g transform="translate(190 144)">
        <circle r="12" fill="#34D399" fill-opacity=".15" stroke="#34D399" stroke-width="1.6"/>
        <path d="M-5 0 l4 4 l7 -8" fill="none" stroke="#34D399" stroke-width="2" stroke-linecap="round"/>
      </g>
      <text x="20" y="168" fill="#34D399" font-size="10" font-weight="600">artifact + audit committed</text>
    </g>
  </g>

  <!-- rail nodes -->
  <g>
    <circle cx="280" cy="290" r="6" fill="#0A0A14" stroke="url(#rail)" stroke-width="2"/>
    <circle cx="550" cy="290" r="6" fill="#0A0A14" stroke="url(#rail)" stroke-width="2"/>
    <circle cx="820" cy="290" r="6" fill="#0A0A14" stroke="url(#rail)" stroke-width="2"/>
    <circle cx="1090" cy="290" r="6" fill="#0A0A14" stroke="url(#rail)" stroke-width="2"/>
  </g>

  <!-- signer panel -->
  <g transform="translate(60 460)">
    <rect width="820" height="240" rx="16" fill="url(#card)" stroke="url(#card-border)"/>
    <text x="28" y="40" fill="#9CA3AF" font-size="11" letter-spacing="2.4" font-weight="600">SIGNERS  ·  3 of 5 collected  ·  Ed25519</text>
    <text x="28" y="68" fill="#EDEDED" font-size="20" font-weight="700">Proposal #2024-091 — deploy v2.4 to ops</text>

    <!-- 5 signer rows -->
    <g transform="translate(28 96)" font-size="12">
      <g transform="translate(0 0)">
        <circle cx="14" cy="14" r="14" fill="#A78BFA" fill-opacity=".18" stroke="#A78BFA" stroke-width="1.4"/>
        <text x="14" y="18" text-anchor="middle" fill="#A78BFA" font-weight="700">M</text>
        <text x="38" y="12" fill="#EDEDED" font-weight="600">@martin</text>
        <text x="38" y="28" fill="#6B7280" font-family="ui-monospace, monospace" font-size="10">ed25519:5f9c…1a · signed 21:01</text>
        <g transform="translate(740 4)"><circle r="10" fill="#34D399" fill-opacity=".18" stroke="#34D399" stroke-width="1.4"/><path d="M-5 0 l4 4 l7 -8" fill="none" stroke="#34D399" stroke-width="2" stroke-linecap="round"/></g>
      </g>
      <g transform="translate(0 44)">
        <circle cx="14" cy="14" r="14" fill="#22D3EE" fill-opacity=".18" stroke="#22D3EE" stroke-width="1.4"/>
        <text x="14" y="18" text-anchor="middle" fill="#22D3EE" font-weight="700">A</text>
        <text x="38" y="12" fill="#EDEDED" font-weight="600">@alex</text>
        <text x="38" y="28" fill="#6B7280" font-family="ui-monospace, monospace" font-size="10">ed25519:9c3a…2f · signed 21:02</text>
        <g transform="translate(740 4)"><circle r="10" fill="#34D399" fill-opacity=".18" stroke="#34D399" stroke-width="1.4"/><path d="M-5 0 l4 4 l7 -8" fill="none" stroke="#34D399" stroke-width="2" stroke-linecap="round"/></g>
      </g>
      <g transform="translate(0 88)">
        <circle cx="14" cy="14" r="14" fill="#34D399" fill-opacity=".18" stroke="#34D399" stroke-width="1.4"/>
        <text x="14" y="18" text-anchor="middle" fill="#34D399" font-weight="700">R</text>
        <text x="38" y="12" fill="#EDEDED" font-weight="600">@robi</text>
        <text x="38" y="28" fill="#6B7280" font-family="ui-monospace, monospace" font-size="10">ed25519:d8ef…77 · signed 21:04</text>
        <g transform="translate(740 4)"><circle r="10" fill="#34D399" fill-opacity=".18" stroke="#34D399" stroke-width="1.4"/><path d="M-5 0 l4 4 l7 -8" fill="none" stroke="#34D399" stroke-width="2" stroke-linecap="round"/></g>
      </g>
      <g transform="translate(0 132)">
        <circle cx="14" cy="14" r="14" fill="#FBBF24" fill-opacity=".15" stroke="#FBBF24" stroke-width="1.4" stroke-dasharray="3 3"/>
        <text x="14" y="18" text-anchor="middle" fill="#FBBF24" font-weight="700">L</text>
        <text x="38" y="12" fill="#94A3B8" font-weight="600">@lukas</text>
        <text x="38" y="28" fill="#6B7280" font-size="10">awaiting · last seen 10m ago</text>
        <g transform="translate(740 4)"><circle r="10" fill="none" stroke="#6B7280" stroke-width="1.4" stroke-dasharray="2 2"/></g>
      </g>
      <g transform="translate(0 176)">
        <circle cx="14" cy="14" r="14" fill="#F472B6" fill-opacity=".15" stroke="#F472B6" stroke-width="1.4" stroke-dasharray="3 3"/>
        <text x="14" y="18" text-anchor="middle" fill="#F472B6" font-weight="700">N</text>
        <text x="38" y="12" fill="#94A3B8" font-weight="600">@nora</text>
        <text x="38" y="28" fill="#6B7280" font-size="10">optional · only needed if Lukas abstains</text>
        <g transform="translate(740 4)"><circle r="10" fill="none" stroke="#6B7280" stroke-width="1.4" stroke-dasharray="2 2"/></g>
      </g>
    </g>
  </g>

  <!-- right-side anchors -->
  <g transform="translate(910 460)">
    <rect width="430" height="240" rx="16" fill="url(#card)" stroke="url(#card-border)"/>
    <text x="28" y="40" fill="#9CA3AF" font-size="11" letter-spacing="2.4" font-weight="600">SETTLEMENT ANCHORS</text>
    <text x="28" y="64" fill="#EDEDED" font-size="14" font-weight="600">Where the signed proposal lives</text>

    <g transform="translate(28 90)" font-size="12">
      <g>
        <rect width="374" height="36" rx="10" fill="#FFFFFF" fill-opacity=".04" stroke="#FFFFFF" stroke-opacity=".10"/>
        <circle cx="22" cy="18" r="9" fill="#22D3EE" fill-opacity=".15" stroke="#22D3EE" stroke-width="1.4"/>
        <text x="42" y="14" fill="#EDEDED" font-weight="600">Matrix room event</text>
        <text x="42" y="28" fill="#6B7280" font-family="ui-monospace, monospace" font-size="10">$evt · DAG-linked timeline</text>
        <text x="356" y="22" fill="#34D399" font-weight="700" text-anchor="end">always</text>
      </g>
      <g transform="translate(0 48)">
        <rect width="374" height="36" rx="10" fill="#FFFFFF" fill-opacity=".04" stroke="#FFFFFF" stroke-opacity=".10"/>
        <circle cx="22" cy="18" r="9" fill="#A78BFA" fill-opacity=".15" stroke="#A78BFA" stroke-width="1.4"/>
        <text x="42" y="14" fill="#EDEDED" font-weight="600">IPFS proposal blob</text>
        <text x="42" y="28" fill="#6B7280" font-family="ui-monospace, monospace" font-size="10">cid: bafyrei…7q9w</text>
        <text x="356" y="22" fill="#34D399" font-weight="700" text-anchor="end">always</text>
      </g>
      <g transform="translate(0 96)">
        <rect width="374" height="36" rx="10" fill="#FFFFFF" fill-opacity=".04" stroke="#FFFFFF" stroke-opacity=".10"/>
        <circle cx="22" cy="18" r="9" fill="#34D399" fill-opacity=".15" stroke="#34D399" stroke-width="1.4"/>
        <text x="42" y="14" fill="#EDEDED" font-weight="600">Safe multisig tx</text>
        <text x="42" y="28" fill="#6B7280" font-family="ui-monospace, monospace" font-size="10">0x9f2c…ab on OP-Mainnet</text>
        <text x="356" y="22" fill="#FBBF24" font-weight="700" text-anchor="end">treasury only</text>
      </g>
      <g transform="translate(0 144)">
        <rect width="374" height="36" rx="10" fill="#FFFFFF" fill-opacity=".04" stroke="#FFFFFF" stroke-opacity=".10"/>
        <circle cx="22" cy="18" r="9" fill="#60A5FA" fill-opacity=".15" stroke="#60A5FA" stroke-width="1.4"/>
        <text x="42" y="14" fill="#EDEDED" font-weight="600">Snapshot off-chain vote</text>
        <text x="42" y="28" fill="#6B7280" font-family="ui-monospace, monospace" font-size="10">optional · gasless</text>
        <text x="356" y="22" fill="#6B7280" font-weight="700" text-anchor="end">opt-in</text>
      </g>
    </g>
  </g>
</svg>
