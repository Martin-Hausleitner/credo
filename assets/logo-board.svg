<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="760" viewBox="0 0 1440 760" role="img" aria-labelledby="title desc">
  <title id="title">Credo Logo Board</title>
  <desc id="desc">A categorized visual board of the Credo Matrix, Hermes, OpenClaw and personal context stack.</desc>
  <defs>
    <style>
      .bg { fill: #f7f9fc; }
      .panel { fill: #ffffff; stroke: #d7dde8; stroke-width: 2; }
      .title { font: 800 44px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #101828; }
      .subtitle { font: 500 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475467; }
      .label { font: 700 21px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #182230; }
      .small { font: 600 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #344054; }
      .tiny { font: 500 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #667085; }
      .chip { fill: #eef2f7; }
      .arrow { stroke: #98a2b3; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#98a2b3"/>
    </marker>
  </defs>

  <rect class="bg" width="1440" height="760" rx="0"/>
  <text class="title" x="70" y="78">Credo</text>
  <text class="subtitle" x="70" y="112">Matrix als Kommunikationsbus. Hermes/OpenClaw/Codex als Agent Runtime. Postgres, Obsidian und ActivityWatch als Gedächtnis.</text>

  <g transform="translate(70 150)">
    <rect class="panel" width="300" height="220" rx="20"/>
    <text class="label" x="24" y="42">01 Kommunikation</text>
    <circle cx="58" cy="88" r="28" fill="#111827"/><text x="48" y="97" font-size="28" fill="#fff">M</text>
    <circle cx="124" cy="88" r="28" fill="#0DBD8B"/><text x="113" y="97" font-size="26" fill="#fff">E</text>
    <circle cx="190" cy="88" r="28" fill="#705CF6"/><text x="180" y="97" font-size="26" fill="#fff">C</text>
    <circle cx="256" cy="88" r="28" fill="#334155"/><text x="247" y="97" font-size="26" fill="#fff">S</text>
    <text class="small" x="24" y="145">Matrix, Synapse/Tuwunel</text>
    <text class="tiny" x="24" y="171">Element, Element X, Cinny, Sable</text>
  </g>

  <path class="arrow" d="M380 260 C425 260 425 260 470 260"/>

  <g transform="translate(480 150)">
    <rect class="panel" width="300" height="220" rx="20"/>
    <text class="label" x="24" y="42">02 Gateway + Inbox</text>
    <circle cx="58" cy="88" r="28" fill="#0ea5e9"/><text x="49" y="97" font-size="25" fill="#fff">B</text>
    <circle cx="124" cy="88" r="28" fill="#f97316"/><text x="114" y="97" font-size="25" fill="#fff">H</text>
    <circle cx="190" cy="88" r="28" fill="#16a34a"/><text x="181" y="97" font-size="25" fill="#fff">C</text>
    <circle cx="256" cy="88" r="28" fill="#64748b"/><text x="247" y="97" font-size="25" fill="#fff">@</text>
    <text class="small" x="24" y="145">Bot, Policy, Chatwoot</text>
    <text class="tiny" x="24" y="171">Himalaya, Beeper, mautrix Bridges</text>
  </g>

  <path class="arrow" d="M790 260 C835 260 835 260 880 260"/>

  <g transform="translate(890 150)">
    <rect class="panel" width="300" height="220" rx="20"/>
    <text class="label" x="24" y="42">03 Agent Runtime</text>
    <circle cx="58" cy="88" r="28" fill="#7c3aed"/><text x="48" y="97" font-size="25" fill="#fff">H</text>
    <circle cx="124" cy="88" r="28" fill="#111827"/><text x="114" y="97" font-size="25" fill="#fff">O</text>
    <circle cx="190" cy="88" r="28" fill="#10b981"/><text x="181" y="97" font-size="25" fill="#fff">C</text>
    <circle cx="256" cy="88" r="28" fill="#f59e0b"/><text x="247" y="97" font-size="25" fill="#fff">S</text>
    <text class="small" x="24" y="145">Hermes, OpenClaw, Codex</text>
    <text class="tiny" x="24" y="171">Skills, MCP, Subagents, Computer Use</text>
  </g>

  <path class="arrow" d="M1040 380 C1040 430 1040 430 1040 480"/>

  <g transform="translate(890 490)">
    <rect class="panel" width="300" height="200" rx="20"/>
    <text class="label" x="24" y="42">06 Betrieb</text>
    <circle cx="58" cy="88" r="28" fill="#f46800"/><text x="49" y="97" font-size="25" fill="#fff">G</text>
    <circle cx="124" cy="88" r="28" fill="#e6522c"/><text x="115" y="97" font-size="25" fill="#fff">P</text>
    <circle cx="190" cy="88" r="28" fill="#242424"/><text x="181" y="97" font-size="25" fill="#fff">T</text>
    <circle cx="256" cy="88" r="28" fill="#2563eb"/><text x="247" y="97" font-size="25" fill="#fff">O</text>
    <text class="small" x="24" y="145">Grafana, Prometheus, Loki</text>
    <text class="tiny" x="24" y="169">OpenTelemetry, Tailscale Admin</text>
  </g>

  <path class="arrow" d="M880 590 C835 590 835 590 790 590"/>

  <g transform="translate(480 490)">
    <rect class="panel" width="300" height="200" rx="20"/>
    <text class="label" x="24" y="42">05 Kontext</text>
    <circle cx="58" cy="88" r="28" fill="#7c3aed"/><text x="49" y="97" font-size="25" fill="#fff">O</text>
    <circle cx="124" cy="88" r="28" fill="#22c55e"/><text x="115" y="97" font-size="25" fill="#fff">A</text>
    <circle cx="190" cy="88" r="28" fill="#111827"/><text x="181" y="97" font-size="25" fill="#fff">W</text>
    <circle cx="256" cy="88" r="28" fill="#ef4444"/><text x="247" y="97" font-size="25" fill="#fff">Y</text>
    <text class="small" x="24" y="145">Obsidian, ActivityWatch</text>
    <text class="tiny" x="24" y="169">WHOOP, Apple, YouTube, Presence</text>
  </g>

  <path class="arrow" d="M470 590 C425 590 425 590 380 590"/>

  <g transform="translate(70 490)">
    <rect class="panel" width="300" height="200" rx="20"/>
    <text class="label" x="24" y="42">04 Daten</text>
    <circle cx="58" cy="88" r="28" fill="#4169e1"/><text x="49" y="97" font-size="25" fill="#fff">P</text>
    <circle cx="124" cy="88" r="28" fill="#dc382d"/><text x="115" y="97" font-size="25" fill="#fff">R</text>
    <circle cx="190" cy="88" r="28" fill="#3fcf8e"/><text x="181" y="97" font-size="25" fill="#fff">S</text>
    <circle cx="256" cy="88" r="28" fill="#f38020"/><text x="247" y="97" font-size="25" fill="#fff">R2</text>
    <text class="small" x="24" y="145">Postgres, pgvector, Redis</text>
    <text class="tiny" x="24" y="169">Supabase optional, S3/R2 Artefakte</text>
  </g>

  <g transform="translate(1230 150)">
    <rect class="panel" width="150" height="540" rx="20"/>
    <text class="label" x="24" y="44">MVP</text>
    <rect class="chip" x="22" y="76" width="106" height="32" rx="16"/><text class="tiny" x="39" y="97">Text first</text>
    <rect class="chip" x="22" y="122" width="106" height="32" rx="16"/><text class="tiny" x="36" y="143">Redis jobs</text>
    <rect class="chip" x="22" y="168" width="106" height="32" rx="16"/><text class="tiny" x="35" y="189">pgvector</text>
    <rect class="chip" x="22" y="214" width="106" height="32" rx="16"/><text class="tiny" x="39" y="235">Tailscale</text>
    <rect class="chip" x="22" y="260" width="106" height="32" rx="16"/><text class="tiny" x="36" y="281">No E2EE rec</text>
    <rect class="chip" x="22" y="306" width="106" height="32" rx="16"/><text class="tiny" x="34" y="327">Voice later</text>
    <rect class="chip" x="22" y="352" width="106" height="32" rx="16"/><text class="tiny" x="34" y="373">Supabase opt</text>
    <rect class="chip" x="22" y="398" width="106" height="32" rx="16"/><text class="tiny" x="37" y="419">Audit hard</text>
  </g>
</svg>
