<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="560" viewBox="0 0 1400 560" role="img" aria-labelledby="lb-title lb-desc" font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif">
  <title id="lb-title">Credo brand mark</title>
  <desc id="lb-desc">Credo logo board: primary mark, wordmark variants, color tokens and typography.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="560" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#07070A"/>
      <stop offset="1" stop-color="#0B0B12"/>
    </linearGradient>
    <radialGradient id="orb1" cx="280" cy="180" r="340" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6366F1" stop-opacity=".40"/>
      <stop offset="1" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="1180" cy="420" r="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22D3EE" stop-opacity=".34"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mark-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#A78BFA"/>
      <stop offset=".5" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <radialGradient id="dot-grad" cx=".5" cy=".5" r=".5">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#A5F3FC"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#FFFFFF" stroke-opacity=".035" stroke-width="1"/>
    </pattern>

    <symbol id="mark" viewBox="0 0 64 64">
      <path d="M47.56 16.44 A22 22 0 1 0 47.56 47.56" fill="none" stroke="url(#mark-grad)" stroke-width="9" stroke-linecap="round"/>
      <circle cx="32" cy="32" r="4.5" fill="url(#dot-grad)"/>
    </symbol>
    <symbol id="mark-mono" viewBox="0 0 64 64">
      <path d="M47.56 16.44 A22 22 0 1 0 47.56 47.56" fill="none" stroke="#EDEDED" stroke-width="9" stroke-linecap="round"/>
      <circle cx="32" cy="32" r="4.5" fill="#EDEDED"/>
    </symbol>
    <symbol id="mark-inv" viewBox="0 0 64 64">
      <path d="M47.56 16.44 A22 22 0 1 0 47.56 47.56" fill="none" stroke="#0A0A0A" stroke-width="9" stroke-linecap="round"/>
      <circle cx="32" cy="32" r="4.5" fill="#0A0A0A"/>
    </symbol>
  </defs>

  <rect width="1400" height="560" fill="url(#bg)"/>
  <rect width="1400" height="560" fill="url(#grid)"/>
  <rect width="1400" height="560" fill="url(#orb1)"/>
  <rect width="1400" height="560" fill="url(#orb2)"/>

  <text x="60" y="64" fill="#9CA3AF" font-size="13" letter-spacing="3" font-weight="500">BRAND  /  MARK  v1.0</text>
  <text x="60" y="92" fill="#EDEDED" font-size="22" font-weight="600">Credo identity system</text>
  <line x1="60" y1="118" x2="1340" y2="118" stroke="#FFFFFF" stroke-opacity=".08"/>

  <g transform="translate(60 170)">
    <use href="#mark" x="0" y="0" width="120" height="120"/>
    <text x="150" y="84" fill="#EDEDED" font-size="80" font-weight="700" letter-spacing="-4">credo</text>
    <text x="152" y="116" fill="#6B7280" font-size="14" letter-spacing="2.4">THE OPERATING SYSTEM FOR YOUR AGENTS</text>
  </g>

  <g transform="translate(60 340)">
    <rect x="0" y="0" width="200" height="170" rx="16" fill="#0F0F14" stroke="#FFFFFF" stroke-opacity=".08"/>
    <use href="#mark" x="60" y="32" width="80" height="80"/>
    <text x="100" y="142" fill="#6B7280" font-size="11" text-anchor="middle" letter-spacing="1.5">ON DARK</text>

    <rect x="220" y="0" width="200" height="170" rx="16" fill="#F8FAFC"/>
    <use href="#mark" x="280" y="32" width="80" height="80"/>
    <text x="320" y="142" fill="#475569" font-size="11" text-anchor="middle" letter-spacing="1.5">ON LIGHT</text>

    <rect x="440" y="0" width="200" height="170" rx="16" fill="#0F0F14" stroke="#FFFFFF" stroke-opacity=".08"/>
    <use href="#mark-mono" x="500" y="32" width="80" height="80"/>
    <text x="540" y="142" fill="#6B7280" font-size="11" text-anchor="middle" letter-spacing="1.5">MONO  ·  WHITE</text>

    <rect x="660" y="0" width="200" height="170" rx="16" fill="#F8FAFC"/>
    <use href="#mark-inv" x="720" y="32" width="80" height="80"/>
    <text x="760" y="142" fill="#475569" font-size="11" text-anchor="middle" letter-spacing="1.5">MONO  ·  BLACK</text>
  </g>

  <g transform="translate(960 170)">
    <text x="0" y="0" fill="#9CA3AF" font-size="12" letter-spacing="2.5" font-weight="500">PALETTE</text>

    <g transform="translate(0 16)">
      <rect x="0" y="0" width="84" height="84" rx="12" fill="#A78BFA"/>
      <text x="0" y="106" fill="#EDEDED" font-size="12" font-weight="600">Violet</text>
      <text x="0" y="122" fill="#6B7280" font-size="11">#A78BFA</text>

      <rect x="98" y="0" width="84" height="84" rx="12" fill="#6366F1"/>
      <text x="98" y="106" fill="#EDEDED" font-size="12" font-weight="600">Indigo</text>
      <text x="98" y="122" fill="#6B7280" font-size="11">#6366F1</text>

      <rect x="196" y="0" width="84" height="84" rx="12" fill="#22D3EE"/>
      <text x="196" y="106" fill="#EDEDED" font-size="12" font-weight="600">Cyan</text>
      <text x="196" y="122" fill="#6B7280" font-size="11">#22D3EE</text>

      <rect x="294" y="0" width="84" height="84" rx="12" fill="#0A0A0A" stroke="#FFFFFF" stroke-opacity=".12"/>
      <text x="294" y="106" fill="#EDEDED" font-size="12" font-weight="600">Black</text>
      <text x="294" y="122" fill="#6B7280" font-size="11">#0A0A0A</text>
    </g>

    <text x="0" y="200" fill="#9CA3AF" font-size="12" letter-spacing="2.5" font-weight="500">TYPOGRAPHY</text>
    <text x="0" y="232" fill="#EDEDED" font-size="34" font-weight="700" letter-spacing="-1.4">Inter — Display</text>
    <text x="0" y="260" fill="#9CA3AF" font-size="16" font-weight="400">Inter Regular — body &amp; UI</text>
    <text x="0" y="288" fill="#6B7280" font-size="13" font-family="ui-monospace, 'SF Mono', Menlo, Monaco, Consolas, monospace">JetBrains Mono — labels &amp; code</text>
  </g>
</svg>
