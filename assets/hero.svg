<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="560" viewBox="0 0 1400 560" role="img" aria-labelledby="title desc">
  <title id="title">Matrix Hermes Agent Stack</title>
  <desc id="desc">Layered architecture illustration for Matrix, Hermes, agents, memory, storage, and observability.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="45%" stop-color="#12343b"/>
      <stop offset="100%" stop-color="#172554"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity=".98"/>
      <stop offset="100%" stop-color="#dbeafe" stop-opacity=".94"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#020617" flood-opacity=".28"/>
    </filter>
  </defs>
  <rect width="1400" height="560" fill="url(#bg)"/>
  <path d="M0 430 C210 360 360 470 560 396 C780 315 950 420 1140 340 C1240 298 1325 292 1400 318 L1400 560 L0 560 Z" fill="#0ea5e9" opacity=".20"/>
  <path d="M0 470 C260 390 430 506 640 436 C855 364 960 475 1190 390 C1280 356 1340 350 1400 370 L1400 560 L0 560 Z" fill="#22c55e" opacity=".18"/>
  <text x="76" y="96" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="46" font-weight="800">Matrix + Hermes Agent Stack</text>
  <text x="78" y="138" fill="#cbd5e1" font-family="Inter, system-ui, sans-serif" font-size="22">Matrix als Kommunikationsbus. Hermes/OpenClaw als Agent Runtime. LiveKit, Postgres und S3 als Ausbaupfad.</text>

  <g filter="url(#shadow)" font-family="Inter, system-ui, sans-serif">
    <rect x="90" y="210" rx="18" width="230" height="130" fill="url(#card)"/>
    <text x="116" y="255" fill="#0f172a" font-size="22" font-weight="800">Clients</text>
    <text x="116" y="292" fill="#334155" font-size="17">Element Web</text>
    <text x="116" y="318" fill="#334155" font-size="17">Cinny / Sable</text>

    <rect x="390" y="180" rx="18" width="240" height="190" fill="url(#card)"/>
    <text x="418" y="228" fill="#0f172a" font-size="22" font-weight="800">Matrix</text>
    <text x="418" y="265" fill="#334155" font-size="17">Tuwunel / Synapse</text>
    <text x="418" y="292" fill="#334155" font-size="17">Rooms + Audit</text>
    <text x="418" y="319" fill="#334155" font-size="17">Bridges optional</text>

    <rect x="700" y="150" rx="18" width="270" height="250" fill="url(#card)"/>
    <text x="730" y="202" fill="#0f172a" font-size="22" font-weight="800">Agent Runtime</text>
    <text x="730" y="240" fill="#334155" font-size="17">Hermes / OpenClaw</text>
    <text x="730" y="267" fill="#334155" font-size="17">Skills + MCP</text>
    <text x="730" y="294" fill="#334155" font-size="17">Redis Queue</text>
    <text x="730" y="321" fill="#334155" font-size="17">Role Checks</text>

    <rect x="1040" y="190" rx="18" width="270" height="170" fill="url(#card)"/>
    <text x="1070" y="240" fill="#0f172a" font-size="22" font-weight="800">Memory + Ops</text>
    <text x="1070" y="278" fill="#334155" font-size="17">Postgres + pgvector</text>
    <text x="1070" y="305" fill="#334155" font-size="17">S3 / R2</text>
    <text x="1070" y="332" fill="#334155" font-size="17">Tailscale + Grafana</text>
  </g>

  <g stroke="#93c5fd" stroke-width="6" stroke-linecap="round" opacity=".85">
    <path d="M320 275 L390 275"/>
    <path d="M630 275 L700 275"/>
    <path d="M970 275 L1040 275"/>
  </g>
</svg>
