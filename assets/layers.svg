<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">Recommended stack layers</title>
  <desc id="desc">A layered map of the recommended Matrix Hermes agent communication stack.</desc>
  <rect width="1400" height="820" fill="#f8fafc"/>
  <text x="70" y="75" font-family="Inter, system-ui, sans-serif" font-size="38" font-weight="800" fill="#0f172a">Recommended Stack Layers</text>
  <text x="72" y="112" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#475569">Build text/job orchestration first. Add bridges, voice and high-end streaming only after the core is stable.</text>

  <g font-family="Inter, system-ui, sans-serif">
    <rect x="80" y="160" width="1240" height="80" rx="14" fill="#dbeafe" stroke="#60a5fa"/>
    <text x="110" y="210" font-size="24" font-weight="800" fill="#1e3a8a">Human UX</text>
    <text x="330" y="210" font-size="22" fill="#1e40af">Element Web + Cinny/Sable + Element X</text>

    <rect x="80" y="260" width="1240" height="80" rx="14" fill="#dcfce7" stroke="#22c55e"/>
    <text x="110" y="310" font-size="24" font-weight="800" fill="#14532d">Matrix Bus</text>
    <text x="330" y="310" font-size="22" fill="#166534">Tuwunel/Synapse, Rooms, Identity, Audit, optional Bridges</text>

    <rect x="80" y="360" width="1240" height="80" rx="14" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="110" y="410" font-size="24" font-weight="800" fill="#78350f">Agent Gateway</text>
    <text x="330" y="410" font-size="22" fill="#92400e">Matrix Bot, hard role checks, Redis Job Queue</text>

    <rect x="80" y="460" width="1240" height="80" rx="14" fill="#ede9fe" stroke="#8b5cf6"/>
    <text x="110" y="510" font-size="24" font-weight="800" fill="#4c1d95">Runtime</text>
    <text x="330" y="510" font-size="22" fill="#5b21b6">Hermes, OpenClaw, Codex/Claude/Gemini Workers, Skills, MCP Tools</text>

    <rect x="80" y="560" width="1240" height="80" rx="14" fill="#fee2e2" stroke="#ef4444"/>
    <text x="110" y="610" font-size="24" font-weight="800" fill="#7f1d1d">Memory</text>
    <text x="330" y="610" font-size="22" fill="#991b1b">Postgres + pgvector, Obsidian Markdown, S3/R2 Artifacts</text>

    <rect x="80" y="660" width="1240" height="80" rx="14" fill="#e2e8f0" stroke="#64748b"/>
    <text x="110" y="710" font-size="24" font-weight="800" fill="#0f172a">Ops</text>
    <text x="330" y="710" font-size="22" fill="#334155">Tailscale-only Admin, OTel, Prometheus, Loki, Grafana, Backups</text>
  </g>
</svg>
