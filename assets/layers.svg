<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="ly-title ly-desc" font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif">
  <title id="ly-title">Credo — layered stack</title>
  <desc id="ly-desc">The Credo stack as five layers: experience, communication, runtime, data, operations.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="820" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#06060A"/>
      <stop offset="1" stop-color="#0A0A14"/>
    </linearGradient>
    <radialGradient id="orb-a" cx="200" cy="100" r="500" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6366F1" stop-opacity=".25"/>
      <stop offset="1" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb-b" cx="1200" cy="720" r="500" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22D3EE" stop-opacity=".22"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#FFFFFF" stroke-opacity=".035"/>
    </pattern>
    <linearGradient id="layer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity=".07"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity=".02"/>
    </linearGradient>
    <linearGradient id="layer-border" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity=".22"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity=".06"/>
    </linearGradient>
    <linearGradient id="c-purple" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#C4B5FD"/><stop offset="1" stop-color="#7C3AED"/></linearGradient>
    <linearGradient id="c-green"  x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#6EE7B7"/><stop offset="1" stop-color="#059669"/></linearGradient>
    <linearGradient id="c-cyan"   x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#67E8F9"/><stop offset="1" stop-color="#0891B2"/></linearGradient>
    <linearGradient id="c-pink"   x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FBCFE8"/><stop offset="1" stop-color="#DB2777"/></linearGradient>
    <linearGradient id="c-amber"  x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FDE68A"/><stop offset="1" stop-color="#D97706"/></linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000" flood-opacity=".55"/>
    </filter>
  </defs>

  <rect width="1400" height="820" fill="url(#bg)"/>
  <rect width="1400" height="820" fill="url(#grid)"/>
  <rect width="1400" height="820" fill="url(#orb-a)"/>
  <rect width="1400" height="820" fill="url(#orb-b)"/>

  <text x="60" y="64" fill="#6366F1" font-size="12" letter-spacing="3" font-weight="600">CREDO  /  STACK</text>
  <text x="60" y="104" fill="#EDEDED" font-size="34" font-weight="700" letter-spacing="-1.4">Five layers, plain to read.</text>
  <text x="60" y="134" fill="#94A3B8" font-size="15">From the human who asks, down to the disk that remembers.</text>

  <!-- 5 horizontal layer bars; each 1240 wide, height 100, gutter 18, start y=180 -->
  <g filter="url(#shadow)">

    <!-- Layer 1: Experience -->
    <g transform="translate(80 180)">
      <rect width="1240" height="100" rx="18" fill="url(#layer)" stroke="url(#layer-border)"/>
      <rect width="6" height="100" rx="3" fill="url(#c-purple)"/>
      <text x="32" y="36" fill="#9CA3AF" font-size="11" letter-spacing="2.4" font-weight="600">LAYER 01</text>
      <text x="32" y="64" fill="#EDEDED" font-size="22" font-weight="700" letter-spacing="-.6">Experience</text>
      <text x="32" y="84" fill="#6B7280" font-size="12">How people meet agents</text>

      <g transform="translate(360 36)" font-size="12" font-weight="500" fill="#E5E7EB">
        <g><rect width="120" height="28" rx="14" fill="#FFFFFF" fill-opacity=".05" stroke="#FFFFFF" stroke-opacity=".12"/><text x="60" y="19" text-anchor="middle">Element Web</text></g>
        <g transform="translate(132 0)"><rect width="90" height="28" rx="14" fill="#FFFFFF" fill-opacity=".05" stroke="#FFFFFF" stroke-opacity=".12"/><text x="45" y="19" text-anchor="middle">Element X</text></g>
        <g transform="translate(234 0)"><rect width="78" height="28" rx="14" fill="#FFFFFF" fill-opacity=".05" stroke="#FFFFFF" stroke-opacity=".12"/><text x="39" y="19" text-anchor="middle">Cinny</text></g>
        <g transform="translate(324 0)"><rect width="148" height="28" rx="14" fill="#FFFFFF" fill-opacity=".05" stroke="#FFFFFF" stroke-opacity=".12"/><text x="74" y="19" text-anchor="middle">Hermes Desktop</text></g>
        <g transform="translate(484 0)"><rect width="120" height="28" rx="14" fill="#FFFFFF" fill-opacity=".05" stroke="#FFFFFF" stroke-opacity=".12"/><text x="60" y="19" text-anchor="middle">Cognitor tray</text></g>
        <g transform="translate(616 0)"><rect width="100" height="28" rx="14" fill="#FFFFFF" fill-opacity=".05" stroke="#FFFFFF" stroke-opacity=".12"/><text x="50" y="19" text-anchor="middle">Chatwoot</text></g>
      </g>
    </g>

    <!-- Layer 2: Communication -->
    <g transform="translate(80 298)">
      <rect width="1240" height="100" rx="18" fill="url(#layer)" stroke="url(#layer-border)"/>
      <rect width="6" height="100" rx="3" fill="url(#c-green)"/>
      <text x="32" y="36" fill="#9CA3AF" font-size="11" letter-spacing="2.4" font-weight="600">LAYER 02</text>
      <text x="32" y="64" fill="#EDEDED" font-size="22" font-weight="700" letter-spacing="-.6">Communication</text>
      <text x="32" y="84" fill="#6B7280" font-size="12">Matrix as the bus, the audit, the state</text>

      <g transform="translate(360 36)" font-size="12" font-weight="500" fill="#E5E7EB">
        <g><rect width="98" height="28" rx="14" fill="#FFFFFF" fill-opacity=".05" stroke="#FFFFFF" stroke-opacity=".12"/><text x="49" y="19" text-anchor="middle">Synapse</text></g>
        <g transform="translate(110 0)"><rect width="98" height="28" rx="14" fill="#FFFFFF" fill-opacity=".05" stroke="#FFFFFF" stroke-opacity=".12"/><text x="49" y="19" text-anchor="middle">Tuwunel</text></g>
        <g transform="translate(220 0)"><rect width="130" height="28" rx="14" fill="#FFFFFF" fill-opacity=".05" stroke="#FFFFFF" stroke-opacity=".12"/><text x="65" y="19" text-anchor="middle">Room topology</text></g>
        <g transform="translate(362 0)"><rect width="140" height="28" rx="14" fill="#FFFFFF" fill-opacity=".05" stroke="#FFFFFF" stroke-opacity=".12"/><text x="70" y="19" text-anchor="middle">mautrix bridges</text></g>
        <g transform="translate(514 0)"><rect width="130" height="28" rx="14" fill="#FFFFFF" fill-opacity=".05" stroke="#FFFFFF" stroke-opacity=".12"/><text x="65" y="19" text-anchor="middle">Element Call</text></g>
        <g transform="translate(656 0)"><rect width="90" height="28" rx="14" fill="#FFFFFF" fill-opacity=".05" stroke="#FFFFFF" stroke-opacity=".12"/><text x="45" y="19" text-anchor="middle">LiveKit</text></g>
      </g>
    </g>

    <!-- Layer 3: Runtime -->
    <g transform="translate(80 416)">
      <rect width="1240" height="100" rx="18" fill="url(#layer)" stroke="url(#layer-border)"/>
      <rect width="6" height="100" rx="3" fill="url(#c-cyan)"/>
      <text x="32" y="36" fill="#9CA3AF" font-size="11" letter-spacing="2.4" font-weight="600">LAYER 03</text>
      <text x="32" y="64" fill="#EDEDED" font-size="22" font-weight="700" letter-spacing="-.6">Runtime</text>
      <text x="32" y="84" fill="#6B7280" font-size="12">Policy gate, queue, agents, skills</text>

      <g transform="translate(360 36)" font-size="12" font-weight="500" fill="#E5E7EB">
        <g><rect width="120" height="28" rx="14" fill="#FFFFFF" fill-opacity=".05" stroke="#FFFFFF" stroke-opacity=".12"/><text x="60" y="19" text-anchor="middle">Policy Gate</text></g>
        <g transform="translate(132 0)"><rect width="120" height="28" rx="14" fill="#FFFFFF" fill-opacity=".05" stroke="#FFFFFF" stroke-opacity=".12"/><text x="60" y="19" text-anchor="middle">Redis Queue</text></g>
        <g transform="translate(264 0)"><rect width="100" height="28" rx="14" fill="#FFFFFF" fill-opacity=".05" stroke="#FFFFFF" stroke-opacity=".12"/><text x="50" y="19" text-anchor="middle">Hermes</text></g>
        <g transform="translate(376 0)"><rect width="110" height="28" rx="14" fill="#FFFFFF" fill-opacity=".05" stroke="#FFFFFF" stroke-opacity=".12"/><text x="55" y="19" text-anchor="middle">OpenClaw</text></g>
        <g transform="translate(498 0)"><rect width="84" height="28" rx="14" fill="#FFFFFF" fill-opacity=".05" stroke="#FFFFFF" stroke-opacity=".12"/><text x="42" y="19" text-anchor="middle">Codex</text></g>
        <g transform="translate(594 0)"><rect width="72" height="28" rx="14" fill="#FFFFFF" fill-opacity=".05" stroke="#FFFFFF" stroke-opacity=".12"/><text x="36" y="19" text-anchor="middle">MCP</text></g>
        <g transform="translate(678 0)"><rect width="80" height="28" rx="14" fill="#FFFFFF" fill-opacity=".05" stroke="#FFFFFF" stroke-opacity=".12"/><text x="40" y="19" text-anchor="middle">Skills</text></g>
      </g>
    </g>

    <!-- Layer 4: Data -->
    <g transform="translate(80 534)">
      <rect width="1240" height="100" rx="18" fill="url(#layer)" stroke="url(#layer-border)"/>
      <rect width="6" height="100" rx="3" fill="url(#c-pink)"/>
      <text x="32" y="36" fill="#9CA3AF" font-size="11" letter-spacing="2.4" font-weight="600">LAYER 04</text>
      <text x="32" y="64" fill="#EDEDED" font-size="22" font-weight="700" letter-spacing="-.6">Data &amp; Memory</text>
      <text x="32" y="84" fill="#6B7280" font-size="12">Canonical ledger, vectors, artifacts, vault</text>

      <g transform="translate(360 36)" font-size="12" font-weight="500" fill="#E5E7EB">
        <g><rect width="110" height="28" rx="14" fill="#FFFFFF" fill-opacity=".05" stroke="#FFFFFF" stroke-opacity=".12"/><text x="55" y="19" text-anchor="middle">Postgres</text></g>
        <g transform="translate(122 0)"><rect width="110" height="28" rx="14" fill="#FFFFFF" fill-opacity=".05" stroke="#FFFFFF" stroke-opacity=".12"/><text x="55" y="19" text-anchor="middle">pgvector</text></g>
        <g transform="translate(244 0)"><rect width="76" height="28" rx="14" fill="#FFFFFF" fill-opacity=".05" stroke="#FFFFFF" stroke-opacity=".12"/><text x="38" y="19" text-anchor="middle">S3</text></g>
        <g transform="translate(332 0)"><rect width="110" height="28" rx="14" fill="#FFFFFF" fill-opacity=".05" stroke="#FFFFFF" stroke-opacity=".12"/><text x="55" y="19" text-anchor="middle">Cloudflare R2</text></g>
        <g transform="translate(454 0)"><rect width="110" height="28" rx="14" fill="#FFFFFF" fill-opacity=".05" stroke="#FFFFFF" stroke-opacity=".12"/><text x="55" y="19" text-anchor="middle">Obsidian</text></g>
        <g transform="translate(576 0)"><rect width="148" height="28" rx="14" fill="#FFFFFF" fill-opacity=".05" stroke="#FFFFFF" stroke-opacity=".12"/><text x="74" y="19" text-anchor="middle">ActivityWatch</text></g>
      </g>
    </g>

    <!-- Layer 5: Operations -->
    <g transform="translate(80 652)">
      <rect width="1240" height="100" rx="18" fill="url(#layer)" stroke="url(#layer-border)"/>
      <rect width="6" height="100" rx="3" fill="url(#c-amber)"/>
      <text x="32" y="36" fill="#9CA3AF" font-size="11" letter-spacing="2.4" font-weight="600">LAYER 05</text>
      <text x="32" y="64" fill="#EDEDED" font-size="22" font-weight="700" letter-spacing="-.6">Operations</text>
      <text x="32" y="84" fill="#6B7280" font-size="12">Tracing, dashboards, network, security</text>

      <g transform="translate(360 36)" font-size="12" font-weight="500" fill="#E5E7EB">
        <g><rect width="150" height="28" rx="14" fill="#FFFFFF" fill-opacity=".05" stroke="#FFFFFF" stroke-opacity=".12"/><text x="75" y="19" text-anchor="middle">OpenTelemetry</text></g>
        <g transform="translate(162 0)"><rect width="110" height="28" rx="14" fill="#FFFFFF" fill-opacity=".05" stroke="#FFFFFF" stroke-opacity=".12"/><text x="55" y="19" text-anchor="middle">Prometheus</text></g>
        <g transform="translate(284 0)"><rect width="80" height="28" rx="14" fill="#FFFFFF" fill-opacity=".05" stroke="#FFFFFF" stroke-opacity=".12"/><text x="40" y="19" text-anchor="middle">Loki</text></g>
        <g transform="translate(376 0)"><rect width="98" height="28" rx="14" fill="#FFFFFF" fill-opacity=".05" stroke="#FFFFFF" stroke-opacity=".12"/><text x="49" y="19" text-anchor="middle">Grafana</text></g>
        <g transform="translate(486 0)"><rect width="110" height="28" rx="14" fill="#FFFFFF" fill-opacity=".05" stroke="#FFFFFF" stroke-opacity=".12"/><text x="55" y="19" text-anchor="middle">Tailscale</text></g>
        <g transform="translate(608 0)"><rect width="110" height="28" rx="14" fill="#FFFFFF" fill-opacity=".05" stroke="#FFFFFF" stroke-opacity=".12"/><text x="55" y="19" text-anchor="middle">SecretMgr</text></g>
      </g>
    </g>
  </g>

  <!-- side annotations -->
  <g font-family="Inter, ui-sans-serif, system-ui, sans-serif">
    <text x="60" y="790" fill="#6B7280" font-size="12" letter-spacing="2">↑  HUMAN</text>
    <text x="1320" y="790" fill="#6B7280" font-size="12" letter-spacing="2" text-anchor="end">DISK  ↓</text>
  </g>
</svg>
